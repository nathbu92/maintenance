
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    text-align: center;
}

.wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    margin-bottom: 10px;
}

p {
    margin-bottom: 15px;
    color: #94a3b8;
}

/* TIMER */
.timer {
    font-size: 20px;
    margin-bottom: 30px;
    font-weight: bold;
    color: #38bdf8;
    letter-spacing: 1px;
}

/* ===== LOADER CAFÉ (inchangé) ===== */

.container {
  width: 300px;
  height: 280px;
  position: relative;
}

.coffee-header {
  width: 100%;
  height: 80px;
  position: absolute;
  top: 0;
  left: 0;
  background-color: #ddcfcc;
  border-radius: 10px;
}

.coffee-header__buttons {
  width: 25px;
  height: 25px;
  position: absolute;
  top: 25px;
  background-color: #282323;
  border-radius: 50%;
}

.coffee-header__button-one { left: 15px; }
.coffee-header__button-two { left: 50px; }

.coffee-header__display {
  width: 50px;
  height: 50px;
  position: absolute;
  top: calc(50% - 25px);
  left: calc(50% - 25px);
  border-radius: 50%;
  background-color: #9acfc5;
  border: 5px solid #43beae;
}

.coffee-header__details {
  width: 8px;
  height: 20px;
  position: absolute;
  top: 10px;
  right: 10px;
  background-color: #9b9091;
  box-shadow: -12px 0 0 #9b9091, -24px 0 0 #9b9091;
}

.coffee-medium {
  width: 90%;
  height: 160px;
  position: absolute;
  top: 80px;
  left: calc(50% - 45%);
  background-color: #bcb0af;
}

.coffee-medium:before {
  content: "";
  width: 90%;
  height: 100px;
  background-color: #776f6e;
  position: absolute;
  bottom: 0;
  left: calc(50% - 45%);
  border-radius: 20px 20px 0 0;
}

.coffe-medium__exit {
  width: 60px;
  height: 20px;
  position: absolute;
  top: 0;
  left: calc(50% - 30px);
  background-color: #231f20;
}

.coffe-medium__exit::before {
  content: "";
  width: 50px;
  height: 20px;
  border-radius: 0 0 50% 50%;
  position: absolute;
  bottom: -20px;
  left: calc(50% - 25px);
  background-color: #231f20;
}

.coffe-medium__exit::after {
  content: "";
  width: 10px;
  height: 10px;
  position: absolute;
  bottom: -30px;
  left: calc(50% - 5px);
  background-color: #231f20;
}

.coffee-medium__arm {
  width: 70px;
  height: 20px;
  position: absolute;
  top: 15px;
  right: 25px;
  background-color: #231f20;
}

.coffee-medium__cup {
  width: 80px;
  height: 47px;
  position: absolute;
  bottom: 0;
  left: calc(50% - 40px);
  background-color: #FFF;
  border-radius: 0 0 70px 70px / 0 0 110px 110px;
}

.coffee-medium__liquid {
  width: 6px;
  height: 63px;
  opacity: 0;
  position: absolute;
  top: 50px;
  left: calc(50% - 3px);
  background-color: #74372b;
  animation: liquid 4s 4s linear infinite;
}

@keyframes liquid {
  0% { height: 0; opacity: 1; }
  20% { height: 62px; opacity: 1; }
  100% { opacity: 0; }
}

.coffee-medium__smoke {
  width: 8px;
  height: 20px;
  position: absolute;
  border-radius: 5px;
  background-color: #b3aeae;
}

.coffee-medium__smoke-one {
  bottom: 50px;
  left: 102px;
  animation: smokeOne 3s infinite;
}

.coffee-medium__smoke-two {
  bottom: 70px;
  left: 118px;
  animation: smokeTwo 3s 1s infinite;
}

.coffee-medium__smoke-three {
  bottom: 65px;
  right: 118px;
  animation: smokeTwo 3s 2s infinite;
}

.coffee-medium__smoke-for {
  bottom: 50px;
  right: 102px;
  animation: smokeOne 3s 1.5s infinite;
}

@keyframes smokeOne {
  0% { opacity: 0; transform: translateY(0); }
  50% { opacity: .5; }
  100% { opacity: 0; transform: translateY(-40px); }
}

@keyframes smokeTwo {
  0% { opacity: 0; transform: translateY(0); }
  50% { opacity: .5; }
  100% { opacity: 0; transform: translateY(-40px); }
}

.coffee-footer {
  width: 95%;
  height: 15px;
  position: absolute;
  bottom: 25px;
  left: calc(50% - 47.5%);
  background-color: #41bdad;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="wrapper">
    <h1>Site en maintenance</h1>
    <p>On revient bientôt… probablement avec moins de bugs.</p>

    <div class="timer" id="timer"></div>

    <!-- LOADER CAFÉ -->
    <div class="container">
        <div class="coffee-header">
          <div class="coffee-header__buttons coffee-header__button-one"></div>
          <div class="coffee-header__buttons coffee-header__button-two"></div>
          <div class="coffee-header__display"></div>
          <div class="coffee-header__details"></div>
        </div>

        <div class="coffee-medium">
          <div class="coffe-medium__exit"></div>
          <div class="coffee-medium__arm"></div>
          <div class="coffee-medium__liquid"></div>
          <div class="coffee-medium__smoke coffee-medium__smoke-one"></div>
          <div class="coffee-medium__smoke coffee-medium__smoke-two"></div>
          <div class="coffee-medium__smoke coffee-medium__smoke-three"></div>
          <div class="coffee-medium__smoke coffee-medium__smoke-for"></div>
          <div class="coffee-medium__cup"></div>
        </div>

        <div class="coffee-footer"></div>
    </div>
</div>

<script>
// DATE FIXE (à modifier quand tu veux)
const targetDate = new Date("2026-05-06T12:00:00").getTime();

const timer = document.getElementById("timer");

setInterval(() => {
    const now = Date.now();
    const diff = targetDate - now;

    if (diff <= 0) {
        timer.innerHTML = "Le site est de retour 🚀";
        return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    timer.innerHTML = `${d}j ${h}h ${m}m ${s}s`;
}, 1000);
</script>

</body>
</html>
